<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model IDOL | Official Page</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6));
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .video-container {
            width: 80%;
            max-width: 1000px;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            background: #111;
        }

        video {
            width: 100%;
            display: block;
        }

        .footer {
            padding: 40px 0;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }

        /* Simple Animation */
        .fade-in {
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <section class="hero fade-in">
        <h1>Model IDOL</h1>
        
        <div class="video-container">
            <video controls poster="thumbnail.jpg">
                <source src="Model_IDOL.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 Model IDOL Project. All Rights Reserved.</p>
    </footer>

</body>
</html>
